<!DOCTYPE html>
<html>
<head>
<title>Renuka Collection</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🛍 Renuka Collection</h1>

<input type="text" id="mobile" placeholder="Enter Mobile Number">
<button onclick="startShop()">Start Shopping</button>

<hr>

<div id="shop" style="display:none;">
<h2>Products</h2>
<div id="products"></div>
</div>

<script>

function startShop(){
let m=document.getElementById("mobile").value;

if(m.length!=10){
alert("Enter valid number");
return;
}

localStorage.setItem("userMobile",m);
document.getElementById("shop").style.display="block";
loadProducts();
}

function loadProducts(){

let products=JSON.parse(localStorage.getItem("products"))||[];
let box=document.getElementById("products");
box.innerHTML="";

products.forEach((p,i)=>{

box.innerHTML+=`
<div class="card">
<img src="${p.image}" width="150">
<h3>${p.name}</h3>
<p>₹${p.price}</p>

<button onclick="bookItem('${p.name}')">
Book The Things
</button>
</div>
`;
});
}

function bookItem(name){

let otp=Math.floor(1000+Math.random()*9000);
let user=localStorage.getItem("userMobile");

let orders=JSON.parse(localStorage.getItem("orders"))||[];

orders.push({
mobile:user,
product:name,
otp:otp
});

localStorage.setItem("orders",JSON.stringify(orders));

alert("Your OTP : "+otp+"\\nShow this OTP in store");
}

</script>

</body>
</html>
