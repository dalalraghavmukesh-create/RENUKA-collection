<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Admin Login</h2>

<input type="password" id="pass" placeholder="Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none;">

<h3>Add Product</h3>

<input id="pname" placeholder="Product Name"><br><br>
<input id="price" placeholder="Price"><br><br>

<input type="file" id="img"><br><br>

<button onclick="addProduct()">Add Item</button>

<hr>

<h3>All Products</h3>
<div id="plist"></div>

<hr>

<h3>Order List</h3>

<input placeholder="Search Mobile" id="search">
<button onclick="findOrder()">Find</button>

<div id="orders"></div>

</div>

<script>

function login(){

if(document.getElementById("pass").value==="1234"){
document.getElementById("panel").style.display="block";
showProducts();
}else{
alert("Wrong Password");
}
}

function addProduct(){

let name=pname.value;
let price=price.value;
let file=img.files[0];

let reader=new FileReader();

reader.onload=function(e){

let products=JSON.parse(localStorage.getItem("products"))||[];

products.push({
name:name,
price:price,
image:e.target.result
});

localStorage.setItem("products",JSON.stringify(products));

alert("Added ✅");
showProducts();
}

reader.readAsDataURL(file);
}

function showProducts(){

let products=JSON.parse(localStorage.getItem("products"))||[];
plist.innerHTML="";

products.forEach((p,i)=>{

plist.innerHTML+=`
<div class="card">
<img src="${p.image}" width="100">
${p.name} ₹${p.price}
<button onclick="deleteItem(${i})">Delete</button>
</div>`;
});
}

function deleteItem(i){

let products=JSON.parse(localStorage.getItem("products"));
products.splice(i,1);
localStorage.setItem("products",JSON.stringify(products));
showProducts();
}

function findOrder(){

let number=search.value;
let orders=JSON.parse(localStorage.getItem("orders"))||[];

ordersDiv="";

orders.forEach(o=>{
if(o.mobile===number){
ordersDiv+=`
<p>Product: ${o.product}
OTP: ${o.otp}</p>`;
}
});

orders.innerHTML=ordersDiv;
}

</script>

</body>
</html>
